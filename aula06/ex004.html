<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font: normal 20px Arial;
        }
    </style>
</head>
<body>
    

    <script>
        var nome = window.prompt('Qual é o seu nome:')
        document.write(`Seu <strong>${nome}</strong> tem ${nome.length} letras. <br>`)
        document.write(`Seu mome em maiúsculs é ${nome.toUpperCase()} <br>`)
        document.write(`Seu nome em minúscula é ${nome.toLowerCase()}`)
    </script>
</body>
</html>
