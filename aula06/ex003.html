<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            background-color: blanchedalmond;
            font: normal 20px Arial;
        }
        h1{
            color: rgb(87, 87, 10);
        }
    </style>
    <title>Meu primeiro em programa</title>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Olá, mundo!</p>
    <script>
        var n1 = Number.parseInt(window.prompt('Digite um primeiro número: '))
        var n2 = Number.parseFloat(window.prompt('Digite o segundo número: '))
        var ns = n1 + n2
        window.alert('A soma dos valores é ' + ns)
</script>
</body>
</html>
