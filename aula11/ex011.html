<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localização</title>
</head>
<body>
    <h1>Informe sua Nacionalidade</h1>
    <p>Informe sua nacionalidade: <input type="text" name="pais" id="pais"></p>
    <input type="button" value="Enviar" onclick="enviar()">
    <div id="res"> 
    </div>

    <script>
        function enviar(){
            var paiz = window.document.querySelector('input#pais')
            var res = window.document.querySelector('div#res')
            var nasc = (paiz.value)
            res.innerHTML = `Você informou o pais:  <strong>${nasc}</strong>. `
            if(nasc == 'Brasil'){
                res.innerHTML += `Você é nascido no Brasil.`
            }
            res.innerHTML += `Você não é nascido no Brasil.`
        }
